<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>读书合集 - DG Books</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #667eea; margin-bottom: 30px; font-size: 28px; }

        /* Auth */
        .auth-section {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .user-info { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; }
        .logout-btn {
            background: #dc3545; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
        }
        .logout-btn:hover { background: #c82333; }
        .google-login-btn {
            display: inline-flex; align-items: center;
            background: white; color: #3c4043; border: 1px solid #dadce0;
            padding: 10px 20px; border-radius: 4px; cursor: pointer;
            font-size: 14px; font-weight: 500;
        }
        .google-login-btn:hover { background: #f8f9fa; }

        /* Book list */
        .book-item {
            background: #f8f9fa; border-left: 4px solid #667eea;
            padding: 20px; margin-bottom: 20px; border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .book-item:hover { transform: translateX(5px); box-shadow: 0 4px 12px rgba(102,126,234,0.2); }
        .book-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .book-title { font-size: 20px; font-weight: bold; color: #2c3e50; flex: 1; margin-bottom: 10px; }
        .book-desc { color: #666; font-size: 14px; line-height: 1.8; }

        /* Read button */
        .read-btn {
            white-space: nowrap; flex-shrink: 0;
            padding: 8px 18px; border-radius: 20px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .read-btn.purchased {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .read-btn.purchased:hover { opacity: 0.88; }
        .read-btn.not-purchased {
            background: white; color: #667eea;
            border: 2px solid #667eea;
        }
        .read-btn.not-purchased:hover { background: #667eea; color: white; }
        .read-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 16px;
            padding: 32px 28px; max-width: 380px; width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: pop 0.2s ease;
        }
        @keyframes pop {
            from { transform: scale(0.9); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .modal-icon { text-align: center; font-size: 48px; margin-bottom: 12px; }
        .modal-title { font-size: 20px; font-weight: bold; color: #2c3e50; text-align: center; margin-bottom: 8px; }
        .modal-book-name { color: #667eea; text-align: center; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        .modal-price {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border-radius: 10px;
            padding: 16px; text-align: center; margin-bottom: 16px;
        }
        .modal-price .price-label { font-size: 13px; opacity: 0.85; }
        .modal-price .price-value { font-size: 36px; font-weight: bold; }
        .modal-price .price-unit { font-size: 18px; vertical-align: super; }
        .modal-desc { color: #888; font-size: 13px; text-align: center; margin-bottom: 24px; line-height: 1.6; }
        .modal-btns { display: flex; gap: 12px; }
        .btn-cancel {
            flex: 1; padding: 12px; border: 2px solid #ddd;
            border-radius: 8px; background: white; color: #666;
            font-size: 15px; cursor: pointer;
        }
        .btn-cancel:hover { border-color: #999; }
        .btn-pay {
            flex: 2; padding: 12px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .btn-pay:hover { opacity: 0.9; }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: white; padding: 14px 28px; border-radius: 50px;
            font-size: 15px; font-weight: 600; opacity: 0;
            transition: opacity 0.3s; z-index: 2000; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 768px) {
            .container { padding: 20px 15px; }
            h1 { font-size: 24px; }
            .book-title { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-section">
            <button class="google-login-btn" id="login-btn" onclick="loginWithGoogle()">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px;">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                使用 Google 登录
            </button>
            <div id="user-info" class="user-info" style="display:none;">
                <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                <span id="user-name"></span>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </div>

        <h1>📚 读书合集</h1>
        <div id="book-list"></div>
    </div>

    <!-- 购买弹窗 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-icon">📖</div>
            <div class="modal-title">解锁读书笔记</div>
            <div class="modal-book-name" id="modal-book-name"></div>
            <div class="modal-price">
                <div class="price-label">一次购买，永久阅读</div>
                <div class="price-value"><span class="price-unit">¥</span>9</div>
            </div>
            <div class="modal-desc">购买后可随时查看完整读书笔记，包含核心观点、金句摘录和实践建议。</div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-pay" id="btn-pay" onclick="doPurchase()">立即购买</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const CLIENT_ID = '79499832651-6e91oog5eett0d70sj9dfde3gf2tfi95.apps.googleusercontent.com';
        const REDIRECT_URI = 'https://booksdg.com/callback.html';
        const API_BASE = 'https://api.booksdg.com';

        const BOOKS = [
            { id: 'book_25', title: '25. 豆包AI时代创富', desc: '面向AI时代的创富指南。未来的"老板"，是那些会把AI当员工使用的人。教会读者如何利用AI工具提升效率、创造价值，在AI时代抓住新的财富机遇。' },
            { id: 'book_24', title: '24. 借势', desc: '揭示借势的智慧——世界上总有"势"可以借，关键在于发现和利用。通过识别趋势、借助平台、整合资源，实现四两拨千斤的效果，加速个人成长。' },
            { id: 'book_23', title: '23. 主角', desc: '一本让自己变得更值钱的成长指南。教导读者如何在人生舞台上成为主角，通过提升自我价值、建立核心竞争力，掌握人生的主动权。' },
            { id: 'book_22', title: '22. 不被大风吹倒', desc: '诺贝尔文学奖得主莫言的散文集，记录了他从小到大的人生态度和生活智慧。通过朴实真挚的文字，展现在时代变迁中如何保持内心的坚韧与从容。' },
            { id: 'book_21', title: '21. 从副业到自由职业', desc: '系统讲解如何从副业起步，逐步过渡到自由职业的完整路径。自由职业是未来每个人的终极目标，本书提供实用的策略和方法，帮助读者实现职业自由。' },
            { id: 'book_20', title: '20. 简单法则', desc: '来自"学术界乔布斯"前田约翰的十大简单法则。在复杂的世界中，简单是最高级的智慧。通过化繁为简的思维方式，提升工作效率和生活品质。' },
            { id: 'book_19', title: '19. 一人公司', desc: '揭示未来10年普通人最佳的进阶方式——打造一人公司。在AI时代，个体创业者通过精简运营、专注价值创造，可以获得更大的自由度和更高的收益。' },
            { id: 'book_18', title: '18. 想赢就要敢上场', desc: '周鸿祎关于公开表达和个人IP打造的实战指南，樊登、鲁豫等名人诚挚推荐。教导读者如何克服恐惧，勇敢展示自己，通过持续输出建立个人影响力。' },
            { id: 'book_17', title: '17. 阅读写作 赋能美好人生', desc: '作者8年读写实践的精华总结，展示阅读与写作如何让内心丰盈、人生有方向。通过持续的读写修炼，实现个人成长和生活品质的全面提升。' },
            { id: 'book_16', title: '16. 快速阅读', desc: '一本实践性极强的阅读指南，提供可立即上手的快速阅读技巧。通过系统训练，帮助读者在保证理解质量的前提下大幅提升阅读速度，高效获取知识。' },
            { id: 'book_15', title: '15. 这样读书就够了', desc: '超越"知行合一"的基础要求，提出更高层次的读书方法论。教会读者如何深度思考、批判性阅读，将书中知识内化为自己的思维体系，实现真正的知识升级。' },
            { id: 'book_14', title: '14. 过目不忘的读书法', desc: '强调读书是改变人生最强的王牌。提供科学的记忆方法和阅读技巧，帮助读者真正做到过目不忘，让每一本书都能在大脑中留下深刻印记，转化为实际能力。' },
            { id: 'book_13', title: '13. 高效阅读：掌控知识的魔法', desc: '颠覆传统学习观念，提出"知识不是学出来的"这一核心理念。教授如何通过高效阅读主动掌控知识，将被动学习转化为主动构建知识体系的能力。' },
            { id: 'book_12', title: '12. 一年顶十年', desc: '揭示超级赚钱的核心秘密——成为有思想魅力的人。通过提升个人思想深度和表达能力，建立独特的个人品牌，实现时间价值的指数级增长。' },
            { id: 'book_11', title: '11. 快速阅读术', desc: '打破"快速阅读是天赋"的误区，证明任何人都可以通过正确的方法掌握快速阅读技能。提供科学的训练体系，帮助读者大幅提升阅读速度的同时保持理解深度。' },
            { id: 'book_10', title: '10. 读懂一本书：樊登读书法', desc: '樊登亲授的读书方法论，系统讲解如何真正读懂一本书。从选书、阅读到吸收转化，提供完整的阅读体系，帮助读者提升阅读效率，将书中知识转化为实际能力。' },
            { id: 'book_09', title: '9. 明智创富指南', desc: '提出"好好做自己，是世间最好的生意"的创富理念。引导读者发现自身独特价值，通过真实表达和专注深耕，在自我实现的同时创造财富。' },
            { id: 'book_08', title: '8. 小米创业思考', desc: '分享小米的创业历程和商业智慧，阐述"优秀的公司赚取利润，伟大的公司赢得人心"的核心理念。通过小米案例，展示如何通过极致的用户体验赢得市场。' },
            { id: 'book_07', title: '7. 微信背后的产品观', desc: '深度解析微信之父张小龙的产品哲学，揭示微信成功背后的设计理念和思考方式。通过学习张小龙的产品观，帮助读者理解如何打造真正以用户为中心的优秀产品。' },
            { id: 'book_06', title: '6. 写出我心：普通人如何通过写作表达自己', desc: '写作大师娜塔莉·戈德堡的经典之作，教导普通人如何通过写作找到真实的自我。书中13条核心建议帮助读者打破写作障碍，用文字真诚地表达内心世界，实现自我疗愈与成长。' },
            { id: 'book_05', title: '5. 写作高手速成手册', desc: '聚焦写作过程中最常见的5大困境，提供针对性的解决方案。强调行动的重要性，鼓励读者在解决基础问题后立即开始实践，通过持续写作快速提升写作能力。' },
            { id: 'book_04', title: '4. 学会写作2.0', desc: '针对写作新手的实用指南，解决"不知道写什么"和"不知道怎么写"的核心困境。提供具体可操作的写作框架和技巧，帮助读者快速上手，建立写作信心，开启写作之旅。' },
            { id: 'book_03', title: '3. 左手阅读，右手写作', desc: '强调阅读与写作是人生最值得投入的两项技能。通过系统化的方法论，教会读者如何将阅读输入高效转化为写作输出，形成知识的闭环循环，实现个人成长的加速度。' },
            { id: 'book_02', title: '2. 高手之路', desc: '深入剖析普通人与高手的本质差异，揭示大多数人停留在"普通"层级的真正原因。书中指出，成为高手不仅需要努力，更需要正确的思维方式和系统化的成长路径。' },
            { id: 'book_01', title: '1. 十倍比两倍更容易', desc: '本书颠覆传统思维，提出做更少反而更容易成功的理念。通过聚焦核心目标，放弃80%的低效努力，专注于真正能带来10倍增长的20%关键事项，帮助读者突破线性增长的困境，实现指数级跃迁。' },
        ];

        // ── 状态 ──────────────────────────────────────────────
        let currentUser = null;
        let purchasedSet = new Set();
        let pendingBook = null;

        // ── 初始化 ────────────────────────────────────────────
        window.onload = async function () {
            const saved = localStorage.getItem('user');
            if (saved) {
                currentUser = JSON.parse(saved);
                showUserUI(currentUser);
                await loadPurchases();
            }
            renderBooks();
        };

        // ── Auth ──────────────────────────────────────────────
        function loginWithGoogle() {
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
                `client_id=${CLIENT_ID}&` +
                `redirect_uri=${encodeURIComponent(REDIRECT_URI)}&` +
                `response_type=code&scope=profile email&access_type=offline`;
            window.location.href = authUrl;
        }

        function showUserUI(user) {
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('user-info').style.display = 'flex';
            document.getElementById('user-avatar').src = user.picture || '';
            document.getElementById('user-name').textContent = user.name;
        }

        function logout() {
            localStorage.removeItem('user');
            currentUser = null;
            purchasedSet.clear();
            location.reload();
        }

        // ── 加载购买记录 ──────────────────────────────────────
        async function loadPurchases() {
            if (!currentUser) return;
            try {
                const res = await fetch(`${API_BASE}/api/purchases/${currentUser.google_id}`);
                const list = await res.json();
                purchasedSet = new Set(list.map(p => p.book_id));
            } catch (e) {
                console.error('加载购买记录失败', e);
            }
        }

        // ── 渲染书单 ──────────────────────────────────────────
        function renderBooks() {
            const container = document.getElementById('book-list');
            container.innerHTML = BOOKS.map(book => {
                const bought = purchasedSet.has(book.id);
                return `
                <div class="book-item">
                    <div class="book-header">
                        <div class="book-title">${book.title}</div>
                        <button
                            class="read-btn ${bought ? 'purchased' : 'not-purchased'}"
                            id="btn-${book.id}"
                            onclick="handleRead('${book.id}')">
                            ${bought ? '📖 阅读' : '🔒 阅读'}
                        </button>
                    </div>
                    <div class="book-desc">${book.desc}</div>
                </div>`;
            }).join('');
        }

        // ── 点击阅读 ──────────────────────────────────────────
        function handleRead(bookId) {
            const book = BOOKS.find(b => b.id === bookId);
            if (!book) return;

            if (!currentUser) {
                showToast('请先登录 Google 账号 👆', '#e74c3c');
                return;
            }

            if (purchasedSet.has(bookId)) {
                window.open('https://google.com', '_blank');
                return;
            }

            openModal(book);
        }

        // ── 弹窗 ──────────────────────────────────────────────
        function openModal(book) {
            pendingBook = book;
            document.getElementById('modal-book-name').textContent = book.title;
            document.getElementById('btn-pay').disabled = false;
            document.getElementById('btn-pay').textContent = '立即购买';
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            pendingBook = null;
        }

        // 点击遮罩关闭
        document.getElementById('modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ── 购买 ──────────────────────────────────────────────
        async function doPurchase() {
            if (!pendingBook || !currentUser) return;

            const payBtn = document.getElementById('btn-pay');
            payBtn.disabled = true;
            payBtn.textContent = '处理中...';

            try {
                const res = await fetch(`${API_BASE}/api/purchase`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        google_id: currentUser.google_id,
                        book_id: pendingBook.id,
                        book_title: pendingBook.title,
                        price: 9,
                    }),
                });
                const data = await res.json();

                if (data.success) {
                    purchasedSet.add(pendingBook.id);
                    const btn = document.getElementById(`btn-${pendingBook.id}`);
                    if (btn) {
                        btn.className = 'read-btn purchased';
                        btn.textContent = '📖 阅读';
                    }
                    closeModal();
                    showToast('🎉 购买成功！正在跳转...', '#2ecc71');
                    setTimeout(() => window.open('https://google.com', '_blank'), 1200);
                } else {
                    showToast('购买失败：' + (data.error || '未知错误'), '#e74c3c');
                    payBtn.disabled = false;
                    payBtn.textContent = '重试';
                }
            } catch (err) {
                showToast('网络错误，请稍后重试', '#e74c3c');
                payBtn.disabled = false;
                payBtn.textContent = '重试';
            }
        }

        // ── Toast ─────────────────────────────────────────────
        function showToast(msg, color = '#2ecc71') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
